display_name = "Backend Builder Agent"
description = "A specialized agent for building and running Django backend servers."
safety = "neutral"
auto_approve = true
system_prompt_id = "builder_backend"

[completion_args]
temperature = 0.2
top_p = 0.9
max_tokens = 2048

# Enable essential tools for Django development
enabled_tools = ["read_file", "write_file", "bash", "grep"]

[tools.bash]
permission = "always"

[tools.write_file]
permission = "always"