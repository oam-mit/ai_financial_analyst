display_name = "PRD Converter Agent"
description = "Converts PRD documents from planner agent into parallelizable task JSON format using built-in tools"
safety = "neutral"
auto_approve = true
system_prompt_id = "prd_converter_agent"

[completion_args]
temperature = 0.0
top_p = 0.9
max_tokens = 2048

# Enable essential tools for file operations
enabled_tools = ["read_file", "write_file", "bash", "grep", "todo"]

[tools.bash]
permission = "always"

[tools.write_file]
permission = "always"

[tools.read_file]
permission = "always"

[tools.grep]
permission = "always"